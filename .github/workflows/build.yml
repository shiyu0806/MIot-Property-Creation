name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install pyinstaller openpyxl requests pandas PyQt6

      - name: Build (macOS)
        if: matrix.platform == 'macos'
        run: |
          python build_exe.py

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        run: |
          python build_exe.py

      - name: Upload artifact (macOS)
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: MIoT平台工具-macOS
          path: dist/MIoT平台工具.app

      - name: Upload artifact (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: MIoT平台工具-Windows
          path: dist/MIoT平台工具.exe

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MIoT平台工具-macOS/*
            MIoT平台工具-Windows/*
          generate_release_notes: true
